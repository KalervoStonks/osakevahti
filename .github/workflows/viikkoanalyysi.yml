name: Viikkoanalyysi
on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 0"
permissions:
  contents: write
concurrency:
  group: osakevahti-data
jobs:
  analysoi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Aja AI-pullonkaula-analyysi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.analyst
      - name: Päivitä seurantalista automaattisesti
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.watchlist_manager
      - name: Muodosta sijoitusnäkemykset
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -m src.recommender
      - name: Tallenna data repoon
        run: |
          git config user.name "osakevahti-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data watchlist.json
          if ! git diff --cached --quiet; then
            git commit -m "Päivitä viikkoanalyysi, seurantalista ja näkemykset"
            git pull --rebase origin main
            git push
          fi
